name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
    paths:
      - index.html
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: a7d32df2a15123552c66a0eb1997ee57
          command: pages deploy . --project-name=luminousmind --branch=main --commit-dirty=true
